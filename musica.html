<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="js/comentarios.js"></script>
    <title>Musica</title>
</head>

<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg bg-custom text-white">
    <div class="container-fluid d-flex justify-content-center">
      <div class="d-flex align-items-center gap-4">
        <!-- izq-->
        <a class="nav-link fw-bold" href="musica.html">Música</a>
        <!-- centro -->
        <a class="navbar-brand" href="index.html">
          <img src="img/ag-logo.png" alt="Atarashi Gakko" class="logo-nav">
        </a>
        <!-- der -->
        <a class="nav-link fw-bold" href="contacto.html">Contacto</a>
      </div>
    </div>
  </nav>

  <!-- Añadimos <main> para que la estructura y el footer se comporten correctamente -->
  <main class="flex-grow-1">
    <div class="d-flex justify-content-center mt-2">
        <div style="max-width: 500px; width: 100%;">

            <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2500">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="img/AG1.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="img/AG2.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="img/AG3.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="img/AG4.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="img/AG5.jpg" class="d-block w-100" alt="...">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- canciones -->
    <div class="container py-5">
        <h2 class="text-center mb-4">5 canciones para conocer Atarashi Gakko</h2>

        <div class="row g-4 justify-content-center">

            <!-- Card 1 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4" onclick="reproducir('l446hUqQ7GY')">
                    <img src="https://img.youtube.com/vi/l446hUqQ7GY/hqdefault.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Otonablue</h6>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4" onclick="reproducir('vU06uPjvFGo')">
                    <img src="https://img.youtube.com/vi/vU06uPjvFGo/hqdefault.jpg" class="card-img-top"
                        alt="Free Your Mind">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Free Your Mind</h6>
                    </div>
                </div>
            </div>


            <!-- Card 3 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4" onclick="reproducir('e0SZ28FP3RI')">
                    <img src="https://img.youtube.com/vi/e0SZ28FP3RI/hqdefault.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Suki Lie</h6>
                    </div>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4" onclick="reproducir('ye5v9mOkDh8')">
                    <img src="https://img.youtube.com/vi/ye5v9mOkDh8/hqdefault.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">恋ゲバ</h6>
                    </div>
                </div>
            </div>

            <!-- Card 5 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4" onclick="reproducir('d3v0QqZlCes')">
                    <img src="https://img.youtube.com/vi/d3v0QqZlCes/hqdefault.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Change</h6>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- COMENTARIOS -->
    <div class="container pb-5">
        <div class="mx-auto" style="max-width: 600px;">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body">
                    <h5 class="card-title fw-bold text-center mb-3">
                        ¿Qué canción te gustó más? Deja tu comentario aquí:
                    </h5>
                    
                    <!-- Formulario de Comentario -->
                    <form id="formComentario" onsubmit="agregarComentario(event)">
                        <div class="mb-3">
                            <input type="text" id="nombreComentario" class="form-control mb-2" placeholder="Tu nombre o apodo" required>
                            <textarea id="textoComentario" class="form-control" rows="3" placeholder="Escribe tu opinión sobre las canciones..." required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-custom">Publicar Comentario</button>
                        </div>
                    </form>

                    <!-- Lista donde se irán inyectando los comentarios-->
                    <div id="listaComentarios" class="mt-4">
                        <hr>
                        <h6 class="fw-bold text-muted mb-3">Comentarios de los fans:</h6>
                        <div id="contenedorComentarios">
                            <!-- Mensaje por defecto cuando no hay comentarios -->
                            <p class="text-muted small text-center italic id='sinComentarios'">Aún no hay comentarios. ¡Comenta primero!</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal fade" id="playerModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content bg-dark">

              <div class="modal-body p-0">
                  <div class="ratio ratio-16x9">
                      <iframe id="playerFrame" src="" allow="autoplay" allowfullscreen>
                      </iframe>
                  </div>
              </div>

          </div>
      </div>
  </div>

  <footer class="bg-custom text-white py-4">
      <div class="container-fluid d-flex justify-content-center">
          <div class="d-flex flex-column flex-lg-row align-items-center gap-3 text-center">
              <p class="fw-bold m-0">
                  De una fan para otr@s fans
              </p>
          </div>
      </div>
      <div class="text-center mt-3 small">
          © 2026 Atarashi Gakko
      </div>
  </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function reproducir(id) {
            document.getElementById("playerFrame").src =
                "https://www.youtube.com/embed/" + id + "?autoplay=1";

            let modal = new bootstrap.Modal(document.getElementById('playerModal'));
            modal.show();
        }
    </script>

</body>

</html>
