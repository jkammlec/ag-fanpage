<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>Contacto</title>
</head>

<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg bg-custom text-white">
    <div class="container-fluid d-flex justify-content-center">

      <div class="d-flex align-items-center gap-4"
        <!-- izq-->
        <a class="nav-link fw-bold" href="musica.html">Música</a>
        <!-- centro -->
        <a class="navbar-brand" href="index.html">
          <img src="img/ag-logo.png" alt="Atarashi Gakko" class="logo-nav">
        </a>
        <!-- der -->
        <a class="nav-link fw-bold" href="contacto.html">Contacto</a>
      </div>
    </div>
  </nav>
    <main class="flex-grow-1">
        <div class="container py-5">
            <div class="mx-auto" style="max-width: 500px;">

                <div class="card shadow rounded-4 border-0">

                    <div class="card-header bg-custom text-white text-center fw-bold">
                        Formulario de contacto
                    </div>

                    <div class="card-body">
                        <p class="text-center text-muted mb-4">
                            Envíanos tus ideas o sugerencias como fan de AG!
                        </p>
                        <form>

                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" placeholder="Tu nombre" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" placeholder="correo@email.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Género</label>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genero" id="m">
                                    <label class="form-check-label" for="m">Masculino</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genero" id="f">
                                    <label class="form-check-label" for="f">Femenino</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genero" id="n">
                                    <label class="form-check-label" for="n">Prefiero no decirlo</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Deja tu mensaje acá</label>
                                <textarea class="form-control" rows="4" placeholder="Escribe tu mensaje..."
                                    required></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-custom">
                                    Enviar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-custom text-white py-4">
        <div class="container-fluid d-flex justify-content-center">
            <div class="d-flex flex-column flex-lg-row align-items-center gap-3 text-center">
                <p class="fw-bold m-0">
                    De una fan para otr@s fans
                </p>
            </div>
        </div>
        <div class="text-center mt-3 small">
            © 2026 Atarashi Gakko
        </div>
    </footer>

</body>

</html>
